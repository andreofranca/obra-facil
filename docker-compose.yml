services:
  postgres:
    image: postgres:16

    container_name: obra-facil-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: obrafacil
      POSTGRES_PASSWORD: obrafacil
      POSTGRES_DB: obrafacil

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: